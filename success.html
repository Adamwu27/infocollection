<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交成功</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f5f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 50px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        .icon { font-size: 60px; margin-bottom: 20px; }
        h1 { color: #FF0000; margin-bottom: 15px; font-size: 28px; }
        p { color: #666; line-height: 1.8; }
        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 30px;
            background: #FF0000;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
        }
        .btn:hover { background: #cc0000; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h1>提交成功！</h1>
	<h1>Submission Complete.</h1>
        <p>感谢您的登记，我们已收到您的信息。<br>工作人员会尽快与您联系。</p>
	<p>Thank you for your registration. We will contact you ASAP.</p>
        <a href="/" class="btn">返回首页</a>
    </div>
</body>
</html>
